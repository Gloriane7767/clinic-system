<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clinic Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            width: 340px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { color: #185FA5; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #185FA5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }
        .error { color: red; font-size: 13px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>Clinic Management System</h2>
    <!-- Show error message if login failed -->
    <p class="error" th:if="${param.error}">Invalid email or password.</p>

    <form th:action="@{/login}" method="post">
        <input type="email" name="email" />   <!-- must be name="email" -->
        <input type="password" name="password" />
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>

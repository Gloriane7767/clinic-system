<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
        .navbar { background: #185FA5; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; }
        .content { padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #185FA5; color: white; padding: 0.75rem 1rem; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #e0e0e0; }
    </style>
</head>
<body>
<div class="navbar">
    <span>Clinic Management System</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/patients}">Patients</a>
        <a th:href="@{/doctors}">Doctors</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:1rem;">Logout</button>
        </form>
    </div>
</div>
<div class="content">
    <h2 th:text="${doctorId != null} ? 'Appointments for Doctor #' + ${doctorId} : 'All Appointments'">Appointments</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date</th><th>Status</th></tr>
        </thead>
        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.id}"></td>
                <td th:text="${appt.patient.name}"></td>
                <td th:text="${appt.doctor.name}"></td>
                <td th:text="${appt.apptDate}"></td>
                <td th:text="${appt.status}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>

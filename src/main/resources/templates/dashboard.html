<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
        .navbar {
            background: #185FA5; color: white;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; }
        .content { padding: 2rem; }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .card {
            background: white; border-radius: 10px;
            padding: 1.5rem; text-align: center;
            border: 1px solid #e0e0e0;
        }
        .card h3 { color: #185FA5; font-size: 2rem; margin: 0; }
        .card p  { color: #666; margin: 0.5rem 0 0; }
    </style>
</head>
<body>
<div class="navbar">
    <span>Clinic Management System</span>
    <div>
        <a th:href="@{/patients}">Patients</a>
        <a th:href="@{/doctors}">Doctors</a>
        <a th:href="@{/appointments}">Appointments</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:1rem;">Logout</button>
        </form>
    </div>
</div>

<div class="content">
    <h2>Welcome, Admin</h2>
    <div class="cards">
        <div class="card">
            <h3 th:text="${patientCount}">0</h3>
            <p>Total Patients</p>
        </div>
        <div class="card">
            <h3 th:text="${doctorCount}">0</h3>
            <p>Total Doctors</p>
        </div>
        <div class="card">
            <h3 th:text="${appointmentCount}">0</h3>
            <p>Total Appointments</p>
        </div>
    </div>
</div>
</body>
</html>

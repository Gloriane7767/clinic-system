<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Find a Doctor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
        .header { background: #185FA5; color: white; padding: 1rem 2rem; }
        .content { padding: 2rem; max-width: 800px; margin: auto; }
        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .search-bar input { flex: 1; padding: 0.6rem 1rem; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        .search-bar button { background: #185FA5; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #185FA5; color: white; padding: 0.75rem 1rem; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #e0e0e0; }
        .no-results { color: #888; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="header">
    <h2 style="margin:0;">Find a Doctor</h2>
</div>
<div class="content">
    <form method="get" th:action="@{/search-doctors}" class="search-bar">
        <input type="text" name="name" placeholder="Search by doctor name..." th:value="${query}" autofocus/>
        <button type="submit">Search</button>
    </form>

    <!-- Results -->
    <div th:if="${doctors != null}">
        <div th:if="${#lists.isEmpty(doctors)}" class="no-results">No doctors found for "<span th:text="${query}"></span>".</div>
        <table th:if="${!#lists.isEmpty(doctors)}">
            <thead>
                <tr><th>Name</th><th>Specialty</th><th>Email</th><th>Phone</th></tr>
            </thead>
            <tbody>
                <tr th:each="doctor : ${doctors}">
                    <td th:text="${doctor.name}"></td>
                    <td th:text="${doctor.specialty}"></td>
                    <td th:text="${doctor.email}"></td>
                    <td th:text="${doctor.phone}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

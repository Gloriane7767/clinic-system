<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
        .navbar { background: #185FA5; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; }
        .content { padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 1.5rem; }
        th { background: #185FA5; color: white; padding: 0.75rem 1rem; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #e0e0e0; }
        .form-card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e0e0e0; }
        .form-card h3 { margin-top: 0; color: #185FA5; }
        .form-card input { padding: 0.5rem; margin: 0.3rem 0.5rem 0.3rem 0; border: 1px solid #ccc; border-radius: 5px; }
        .form-card button { background: #185FA5; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 5px; cursor: pointer; }
        td a { color: #185FA5; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="navbar">
    <span>Clinic Management System</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/patients}">Patients</a>
        <a th:href="@{/appointments}">Appointments</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:1rem;">Logout</button>
        </form>
    </div>
</div>
<div class="content">
    <h2>Doctors</h2>

    <!-- Admin: Add Doctor Form -->
    <div class="form-card">
        <h3>Add New Doctor</h3>
        <form th:action="@{/doctors}" th:object="${newDoctor}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input th:field="*{name}"      placeholder="Full Name"   required />
            <input th:field="*{email}"     placeholder="Email"       required type="email"/>
            <input th:field="*{specialty}" placeholder="Specialty"   required />
            <input th:field="*{phone}"     placeholder="Phone"       />
            <button type="submit">Add Doctor</button>
        </form>
    </div>

    <!-- Doctors Table -->
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Specialty</th><th>Phone</th><th>Appointments</th></tr>
        </thead>
        <tbody>
            <tr th:each="doctor : ${doctors}">
                <td th:text="${doctor.id}"></td>
                <td th:text="${doctor.name}"></td>
                <td th:text="${doctor.email}"></td>
                <td th:text="${doctor.specialty}"></td>
                <td th:text="${doctor.phone}"></td>
                <td><a th:href="@{/doctors/{id}/appointments(id=${doctor.id})}">View Appointments</a></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
